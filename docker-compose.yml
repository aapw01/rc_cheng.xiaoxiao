services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/notifications
      REDIS_URL: redis://redis:6379/0
      API_KEY: dev-api-key
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/notifications
      REDIS_URL: redis://redis:6379/0
      API_KEY: dev-api-key
    depends_on:
      - postgres
      - redis
    command: uv run dramatiq app.tasks.delivery --queues notifications_crm notifications_ads notifications_inventory

  web:
    image: node:24-alpine
    working_dir: /app/web
    volumes:
      - .:/app
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_API_KEY: dev-api-key
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data:
