name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: notifications
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d notifications"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.14

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Lint backend
        run: uv run ruff check .

      - name: Test backend
        run: uv run pytest -q

      - name: Run PostgreSQL migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/notifications
        run: uv run alembic upgrade head

      - name: Verify migrations match SQLAlchemy models
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/notifications
        run: uv run alembic check

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm --prefix web ci

      - name: Build web
        run: npm --prefix web run build
