services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  mock-vendor:
    image: notification-platform:local
    command: uv run python scripts/mock_vendor.py

  api:
    image: notification-platform:local
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/notifications
      REDIS_URL: redis://redis:6379/0
      API_KEY: dev-api-key
      PROVIDER_CRM_BASE_URL: http://mock-vendor:9000
    depends_on:
      - postgres
      - redis
    ports:
      - "18000:8000"
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    image: notification-platform:local
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/notifications
      REDIS_URL: redis://redis:6379/0
      API_KEY: dev-api-key
      PROVIDER_CRM_BASE_URL: http://mock-vendor:9000
    depends_on:
      - postgres
      - redis
      - mock-vendor
    command: uv run python scripts/run_worker.py

volumes:
  postgres_data:
